<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10284a">
  <meta name="description" content="Timed speaker cue cards for Session 5: Introduction to Deep Learning in Food Research.">
  <title>Session 5 Cue Cards</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2310284a'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Georgia' font-size='34' font-weight='700' fill='white'%3E05%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="timer-track" aria-hidden="true">
    <div class="timer-progress" id="timerProgress"></div>
  </div>

  <header class="app-header">
    <div class="session-mark" aria-label="Session 5">
      <span class="session-number">05</span>
      <span class="session-label">Food Research<br>Cue Cards</span>
    </div>

    <div class="timing" aria-live="polite">
      <span class="timing-label" id="timerState">Ready</span>
      <strong id="timeDisplay">01:30</strong>
    </div>

    <div class="header-actions">
      <a class="icon-button download-link" href="assets/Session%205%20-%20Speaker%20Cue%20Cards.pdf" download
         aria-label="Download the complete cue card PDF" title="Download PDF">
        <span aria-hidden="true">↓</span>
      </a>
      <button class="icon-button" id="fullscreenButton" type="button"
              aria-label="Enter fullscreen" title="Fullscreen (F)">
        <span aria-hidden="true">⛶</span>
      </button>
    </div>
  </header>

  <main>
    <section class="reader" aria-label="Cue card reader">
      <button class="edge-nav previous" id="previousButton" type="button"
              aria-label="Previous card">
        <span aria-hidden="true">←</span>
      </button>

      <figure class="card-stage" id="cardStage">
        <div class="card-frame">
          <img id="cardImage" src="assets/cards/01.webp"
               alt="Speaker cue card for slide 1" width="1091" height="772">
          <div class="time-up" id="timeUp" role="status">Time</div>
        </div>
        <figcaption>
          <span id="slideCounter">Slide 01 / 35</span>
          <span class="total-plan">85-minute plan · 5-minute buffer</span>
        </figcaption>
      </figure>

      <button class="edge-nav next" id="nextButton" type="button"
              aria-label="Next card">
        <span aria-hidden="true">→</span>
      </button>
    </section>
  </main>

  <footer class="control-dock" aria-label="Playback controls">
    <button class="text-button" id="resetButton" type="button">
      <span aria-hidden="true">↺</span> Reset
    </button>
    <button class="primary-button" id="playButton" type="button" aria-pressed="false">
      <span id="playIcon" aria-hidden="true">▶</span>
      <span id="playLabel">Start timer</span>
    </button>
    <label class="auto-advance">
      <input id="autoAdvance" type="checkbox">
      <span class="toggle" aria-hidden="true"></span>
      Auto-advance
    </label>
  </footer>

  <div class="keyboard-hint" id="keyboardHint">
    <span><kbd>←</kbd><kbd>→</kbd> flip</span>
    <span><kbd>Space</kbd> timer</span>
    <span><kbd>R</kbd> reset</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
